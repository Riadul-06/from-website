<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html login page</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>

<body>

    <div class="container">
        <h1 class="logo">Login</h1>
        <form id="loginForm">
            <input id="loginEmail" name="email" type="email" placeholder="Email" required>
            <input id="loginPassword" name="password" type="password" placeholder="Password" required>
            <button class="btn google-btn" type="submit">Login</button>
        </form>
        <div class="divider">or</div>

        <p class="login-link">Don't have an account? <a href="Sign-in.html">Sign-up</a></p>
    </div>
</body>

</html>
