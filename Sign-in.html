<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>html login page</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">

</head>

<body>

    <div class="container">
        <h1 class="logo">Sign-Up</h1>
        <form id="signupForm">
            <input id="signupPhone" name="phone" type="tel" placeholder="Phone number" required>
            <input id="signupFirst" name="firstName" type="text" placeholder="First Name" required>
            <input id="signupLast" name="lastName" type="text" placeholder="Last Name" required>
            <input id="signupBirthday" name="birthday" type="date" placeholder="Birthday" required>
            <input id="signupEmail" name="email" type="email" placeholder="Email" required>
            <input id="signupPassword" name="password" type="password" placeholder="Create Password" required>
            <button class="btn google-btn" type="submit"><i class="fab fa-google"></i>Sign Up</button>
        </form>
        <div class="divider">or</div>
        <a href="https://www.facebook.com/riadul9200" class="btn facebook-btn"><i class="fab fa-facebook-f"></i>
            Continue with Facebook</a>
        <p class="login-link">Already have an account? <a href="index.html">Log in</a></p>
    </div>
</body>

</html>
